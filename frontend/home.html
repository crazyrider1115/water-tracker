<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎥 WATER VIDEO BACKGROUND -->
<video id="bgVideo" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2017/05/22/9226-217857756_large.mp4" type="video/mp4">
</video>

<!-- 🌊 WATER MASK (controls fill height) -->
<div id="waterMask"></div>

<div class="container">

  <!-- 👤 PROFILE -->
  <button class="profile-btn" onclick="goProfile()">👤</button>

  <div class="card">
    <h1 class="title">💧 Water Tracker</h1>

    <!-- GOAL -->
    <input id="goalInput" placeholder="Set goal (ml)">
    <button class="btn" onclick="setGoal()">Set Goal</button>

    <p id="waterText">0 / 2000 ml</p>

    <div class="buttons">
      <button onclick="addWater(250)">+250 ml</button>
      <button onclick="addWater(500)">+500 ml</button>
    </div>

    <button class="btn" onclick="logout()">Logout</button>
  </div>

</div>

<script src="home.js"></script>
</body>
</html>
