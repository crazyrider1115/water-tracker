<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌊 WAVES -->
<div id="waveContainer">
  <div class="wave"></div>
  <div class="wave wave2"></div>
</div>

<!-- 🫧 BUBBLES -->
<div id="bubbles"></div>

<div class="container">

  <button class="profile-btn" onclick="goProfile()">👤</button>

  <div class="card">
    <h1 class="title">💧 Water Tracker</h1>

    <p id="streakText">🔥 Streak: 0 days</p>

    <input id="goalInput" placeholder="Set goal (ml)">
    <button class="btn" onclick="setGoal()">Set Goal</button>

    <p id="waterText">0 / 2000 ml</p>
    <p id="message"></p>

    <div class="buttons">
      <button onclick="addWater(250)">+250 ml</button>
      <button onclick="addWater(500)">+500 ml</button>
    </div>

    <button class="btn" onclick="resetWater()">Reset</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

</div>

<script src="home.js"></script>
</body>
</html>
